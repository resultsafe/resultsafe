name: Release Result Package

on:
  workflow_dispatch:

jobs:
  release-result:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      RELEASE_PACKAGES: "@resultsafe/core-fp-result"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard publish allowlist
        run: pnpm run release:guard:result

      - name: Verify release readiness
        run: pnpm run release:verify

      - name: Apply versioning
        run: pnpm run version:prepare

      - name: Publish
        run: pnpm run release:publish
