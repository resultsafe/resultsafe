name: CI Versioning

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  verify-result-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate changeset status
        run: pnpm run changeset:check

      - name: Enforce API changeset policy
        run: pnpm run changeset:require-for-api

      - name: Verify release readiness
        run: pnpm run release:verify
