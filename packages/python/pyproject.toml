[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "resultsafe-monorepo-core-fp"
version = "0.1.0"
description = "Functional Result/Option primitives for Python that mirror the ResultSafe contracts."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "ResultSafe Team", email = "contact@resultsafe.dev" },
]
keywords = ["resultsafe", "functional", "result", "option", "pyfp"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Libraries :: Application Frameworks",
]

[project.urls]
Homepage = "https://resultsafe.dev"
Repository = "https://github.com/resultsafe/monorepo"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "mypy>=1.10",
  "build>=0.10",
]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
